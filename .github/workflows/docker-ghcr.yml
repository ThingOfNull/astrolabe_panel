name: Docker (GHCR)

# Build multi-stage Dockerfile and push to GitHub Container Registry.
# Permissions: Repository → Settings → Actions → General → Workflow permissions:
# ensure GITHUB_TOKEN can write packages (read/write recommended for pushes).

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR / Docker registry names must be lower-case.
      - name: Image name (lowercase)
        run: >-
          printf 'IMAGE_NAME=ghcr.io/%s\n' "$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          >> "$GITHUB_ENV"

      - name: Docker Buildx setup
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build-args (version/commit)
        id: vb
        run: |
          set -eu
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "version=${GITHUB_REF_NAME}-ci.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          fi
          echo "commit=$(printf '%.40s' "${GITHUB_SHA}")" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}

      - id: build
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vb.outputs.version }}
            COMMIT=${{ steps.vb.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Digest
        run: echo "${{ steps.build.outputs.digest }}"
